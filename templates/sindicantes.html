<!DOCTYPE html>
<html>
<head>
    <title>Sindicantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Gerenciar Sindicantes</h2>

    <!-- ERRO -->
    {% if erro %}
    <div class="alert alert-danger">
        {{ erro }}
    </div>
    {% endif %}

    <!-- FORMULÁRIO -->
    <div class="card mb-4 shadow">
        <div class="card-body">
            <form method="POST">
                <div class="mb-2">
                    <input class="form-control" name="usuario" placeholder="Usuário" required>
                </div>
                <div class="mb-2">
                    <input class="form-control" name="senha" type="password" placeholder="Senha" required>
                </div>
                <button class="btn btn-primary">Adicionar Sindicante</button>
            </form>
        </div>
    </div>

    <!-- TABELA -->
    <table class="table table-bordered table-hover">
        <tr class="table-dark">
            <th>Usuário</th>
            <th style="width: 120px;">Ação</th>
        </tr>

        {% for s in sindicantes %}
        <tr>
            <td><strong>{{ s[1] }}</strong></td>
            <td>
                <a class="btn btn-sm btn-danger"
                   href="/excluir_sindicante/{{ s[0] }}"
                   onclick="return confirm('Tem certeza que deseja excluir este sindicante?')">
                   Excluir
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <!-- SEM REGISTROS -->
    {% if sindicantes|length == 0 %}
    <div class="alert alert-info">
        Nenhum sindicante cadastrado.
    </div>
    {% endif %}

    <a href="/dashboard" class="btn btn-secondary">Voltar</a>

</div>

</body>
</html>
