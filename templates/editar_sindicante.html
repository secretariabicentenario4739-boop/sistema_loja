<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Sindicante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-pencil-square"></i> Editar Sindicante</h2>
                <a href="/sindicantes" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Voltar
                </a>
            </div>

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">{{ sindicante.usuario }}</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Usuário (login)</label>
                                <input type="text" class="form-control" value="{{ sindicante.usuario }}" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tipo</label>
                                <input type="text" class="form-control" value="{{ sindicante.tipo }}" readonly>
                            </div>
                        </div>

                        <hr>
                        <h6 class="mb-3">Informações Pessoais</h6>

                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" name="nome_completo" 
                                       value="{{ sindicante.nome_completo or '' }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">CIM Nº</label>
                                <input type="text" class="form-control" name="cim_numero" 
                                       value="{{ sindicante.cim_numero or '' }}" required>
                            </div>
                        </div>

                        <hr>
                        <h6 class="mb-3">Loja Maçônica</h6>

                        <div class="row">
                            <div class="col-md-5 mb-3">
                                <label class="form-label">Nome da Loja</label>
                                <select class="form-select" name="loja_nome" id="lojaSelect" onchange="carregarLoja()">
                                    <option value="">Selecione uma loja...</option>
                                    {% for loja in lojas %}
                                    <option value="{{ loja.nome }}" 
                                            data-numero="{{ loja.numero }}"
                                            data-oriente="{{ loja.oriente }}"
                                            {% if loja.nome == sindicante.loja_nome %}selected{% endif %}>
                                        {{ loja.nome }} - Nº {{ loja.numero }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Nº da Loja</label>
                                <input type="text" class="form-control" name="loja_numero" id="lojaNumero"
                                       value="{{ sindicante.loja_numero or '' }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Oriente</label>
                                <input type="text" class="form-control" name="loja_orient" id="lojaOriente"
                                       value="{{ sindicante.loja_orient or '' }}" required>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-success btn-lg px-5">
                                <i class="bi bi-save"></i> Salvar Alterações
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function carregarLoja() {
            const select = document.getElementById('lojaSelect');
            const selected = select.options[select.selectedIndex];
            
            if (selected.value) {
                document.getElementById('lojaNumero').value = selected.dataset.numero || '';
                document.getElementById('lojaOriente').value = selected.dataset.oriente || '';
            }
        }
    </script>
</body>
</html>
