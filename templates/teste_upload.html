{% extends "base.html" %}

{% block title %}Teste Upload{% endblock %}

{% block content %}
<div class="container py-5">
    <h2>Teste de Upload - COM BASE.HTML</h2>
    
    <div class="card">
        <div class="card-body">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalUpload">
                Abrir Modal de Upload
            </button>
            
            <div class="modal fade" id="modalUpload" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Upload de Documento</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <input type="file" class="form-control" id="arquivoTeste">
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                            <button type="button" class="btn btn-primary" onclick="testarUpload()">Enviar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function testarUpload() {
        const arquivo = document.getElementById('arquivoTeste').files[0];
        if (!arquivo) {
            alert('Selecione um arquivo!');
            return;
        }
        alert('Upload funcionaria para: ' + arquivo.name);
    }
</script>
{% endblock %}
