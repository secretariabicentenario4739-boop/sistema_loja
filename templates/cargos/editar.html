{% extends "base.html" %}

{% block title %}Editar Cargo - {{ cargo.nome }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-pencil-square"></i> 
                Editar Cargo: {{ cargo.nome }}
            </h2>
            <a href="/cargos" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="card shadow">
            <div class="card-header bg-warning">
                <h5 class="mb-0">
                    <i class="bi bi-diagram-3"></i> 
                    Editar Dados do Cargo
                </h5>
            </div>
            <div class="card-body">
                <form method="POST" action="/cargos/editar/{{ cargo.id }}">
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Nome do Cargo *</label>
                            <input type="text" class="form-control" name="nome" required 
                                   value="{{ cargo.nome }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Sigla *</label>
                            <input type="text" class="form-control" name="sigla" required 
                                   value="{{ cargo.sigla }}" maxlength="5">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Ordem *</label>
                            <input type="number" class="form-control" name="ordem" required 
                                   value="{{ cargo.ordem }}" min="1">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Grau Mínimo *</label>
                            <select class="form-select" name="grau_minimo" required>
                                <option value="1" {% if cargo.grau_minimo == 1 %}selected{% endif %}>Aprendiz (1º Grau)</option>
                                <option value="2" {% if cargo.grau_minimo == 2 %}selected{% endif %}>Companheiro (2º Grau)</option>
                                <option value="3" {% if cargo.grau_minimo == 3 %}selected{% endif %}>Mestre (3º Grau)</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="ativo">
                                <option value="1" {% if cargo.ativo != 0 %}selected{% endif %}>Ativo</option>
                                <option value="0" {% if cargo.ativo == 0 %}selected{% endif %}>Inativo</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" name="descricao" rows="3">{{ cargo.descricao or '' }}</textarea>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-warning btn-lg px-5">
                            <i class="bi bi-save"></i> Atualizar Cargo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
