{% extends "base.html" %}

{% block title %}Novo Cargo{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-plus-circle"></i> 
                Novo Cargo
            </h2>
            <a href="/cargos" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">
                    <i class="bi bi-diagram-3"></i> 
                    Dados do Cargo
                </h5>
            </div>
            <div class="card-body">
                <form method="POST" action="/cargos/novo">
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Nome do Cargo *</label>
                            <input type="text" class="form-control" name="nome" required 
                                   placeholder="Ex: Venerável Mestre, 1º Vigilante, etc.">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Sigla *</label>
                            <input type="text" class="form-control" name="sigla" required 
                                   placeholder="Ex: VM, 1V, SEC" maxlength="5">
                            <small class="text-muted">Máximo 5 caracteres</small>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Ordem *</label>
                            <input type="number" class="form-control" name="ordem" required 
                                   placeholder="1, 2, 3..." min="1">
                            <small class="text-muted">Ordem hierárquica (1 = mais elevado)</small>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Grau Mínimo *</label>
                            <select class="form-select" name="grau_minimo" required>
                                <option value="1">Aprendiz (1º Grau)</option>
                                <option value="2">Companheiro (2º Grau)</option>
                                <option value="3">Mestre (3º Grau)</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" name="ativo">
                                <option value="1">Ativo</option>
                                <option value="0">Inativo</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" name="descricao" rows="3" 
                                  placeholder="Descreva as atribuições e responsabilidades deste cargo..."></textarea>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-success btn-lg px-5">
                            <i class="bi bi-save"></i> Salvar Cargo
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
