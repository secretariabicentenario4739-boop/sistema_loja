{% extends "base.html" %}

{% block title %}Editar Loja{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-building-gear"></i> 
                Editar Loja: {{ loja.nome }}
            </h2>
            <a href="/lojas" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

       
        <div class="card shadow">
            <div class="card-body">
                <form method="POST">
                    <!-- Informações Básicas -->
                    <h5 class="mb-3 text-primary">
                        <i class="bi bi-info-circle"></i> Informações Básicas
                    </h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome da Loja *</label>
                            <input type="text" name="nome" class="form-control" value="{{ loja.nome }}" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Número</label>
                            <input type="text" name="numero" class="form-control" value="{{ loja.numero or '' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Oriente</label>
                            <input type="text" name="oriente" class="form-control" value="{{ loja.oriente or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Rito</label>
                            <input type="text" name="rito" class="form-control" value="{{ loja.rito or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-check mt-4">
                                <input type="checkbox" name="ativo" class="form-check-input" id="ativo" {% if loja.ativo == 1 %}checked{% endif %}>
                                <label class="form-check-label" for="ativo">Loja Ativa</label>
                            </label>
                        </div>
                    </div>

                    <!-- Endereço -->
                    <h5 class="mb-3 text-primary mt-4">
                        <i class="bi bi-geo-alt"></i> Endereço
                    </h5>
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Endereço</label>
                            <input type="text" name="endereco" class="form-control" value="{{ loja.endereco or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Bairro</label>
                            <input type="text" name="bairro" class="form-control" value="{{ loja.bairro or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Cidade</label>
                            <input type="text" name="cidade" class="form-control" value="{{ loja.cidade or '' }}">
                        </div>
                        <div class="col-md-2 mb-3">
                            <label class="form-label">UF</label>
                            <input type="text" name="uf" class="form-control" value="{{ loja.uf or '' }}" maxlength="2">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">CEP</label>
                            <input type="text" name="cep" class="form-control" value="{{ loja.cep or '' }}">
                        </div>
                    </div>

                    <!-- Contato -->
                    <h5 class="mb-3 text-primary mt-4">
                        <i class="bi bi-envelope"></i> Contato
                    </h5>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Telefone</label>
                            <input type="text" name="telefone" class="form-control" value="{{ loja.telefone or '' }}" id="telefone">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ loja.email or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Site</label>
                            <input type="text" name="site" class="form-control" value="{{ loja.site or '' }}">
                        </div>
                    </div>

                    <!-- Datas Importantes -->
                    <h5 class="mb-3 text-primary mt-4">
                        <i class="bi bi-calendar"></i> Datas Importantes
                    </h5>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Data de Fundação</label>
                            <input type="date" name="data_fundacao" class="form-control" value="{{ loja.data_fundacao or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Data de Instalação</label>
                            <input type="date" name="data_instalacao" class="form-control" value="{{ loja.data_instalacao or '' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Data de Autorização</label>
                            <input type="date" name="data_autorizacao" class="form-control" value="{{ loja.data_autorizacao or '' }}">
                        </div>
                    </div>

                    <!-- Horários e Sessões -->
                    <h5 class="mb-3 text-primary mt-4">
                        <i class="bi bi-clock-history"></i> Horários e Sessões
                    </h5>
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Horário de Início</label>
                            <input type="time" class="form-control" name="horario_inicio" value="{{ loja.horario_inicio.strftime('%H:%M') if loja.horario_inicio else '09:00' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Horário de Término</label>
                            <input type="time" class="form-control" name="horario_termino" value="{{ loja.horario_termino.strftime('%H:%M') if loja.horario_termino else '11:00' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Frequência</label>
                            <select class="form-select" name="frequencia_sessao">
                                <option value="semanal" {% if loja.frequencia_sessao == 'semanal' %}selected{% endif %}>Semanal</option>
                                <option value="quinzenal" {% if loja.frequencia_sessao == 'quinzenal' %}selected{% endif %}>Quinzenal</option>
                                <option value="mensal" {% if loja.frequencia_sessao == 'mensal' %}selected{% endif %}>Mensal</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Dias das Sessões</label>
                            <select class="form-select" name="dias_sessao">
                                <option value="2,4" {% if loja.dias_sessao == '2,4' %}selected{% endif %}>Terças e Quintas</option>
                                <option value="3,5" {% if loja.dias_sessao == '3,5' %}selected{% endif %}>Quartas e Sextas</option>
                                <option value="1,3" {% if loja.dias_sessao == '1,3' %}selected{% endif %}>Segundas e Quartas</option>
                                <option value="sabados" {% if loja.dias_sessao == 'sabados' %}selected{% endif %}>Sábados (2º e 4º)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-12 mb-3">
                            <label class="form-label">Observações de Horário</label>
                            <textarea name="observacoes_horario" class="form-control" rows="2" placeholder="Ex: 2º e 4º sábados do mês...">{{ loja.observacoes_horario or '' }}</textarea>
                        </div>
                    </div>

                    <!-- Dirigentes -->
                    <h5 class="mb-3 text-primary mt-4">
                        <i class="bi bi-people"></i> Dirigentes
                    </h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Venerável Mestre</label>
                            <input type="text" name="veneravel_mestre" class="form-control" value="{{ loja.veneravel_mestre or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Secretário</label>
                            <input type="text" name="secretario" class="form-control" value="{{ loja.secretario or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tesoureiro</label>
                            <input type="text" name="tesoureiro" class="form-control" value="{{ loja.tesoureiro or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Orador</label>
                            <input type="text" name="orador" class="form-control" value="{{ loja.orador or '' }}">
                        </div>
                    </div>

                    <!-- Observações Gerais -->
                    <h5 class="mb-3 text-primary mt-4">
                        <i class="bi bi-chat-text"></i> Observações Gerais
                    </h5>
                    <div class="row">
                        <div class="col-12 mb-3">
                            <textarea name="observacoes" class="form-control" rows="4">{{ loja.observacoes or '' }}</textarea>
                        </div>
                    </div>

                    <div class="text-end mt-4">
                        <button type="submit" class="btn btn-primary btn-lg px-5">
                            <i class="bi bi-save"></i> Salvar
                        </button>
                        <a href="/lojas" class="btn btn-secondary btn-lg px-5 ms-2">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Máscara para telefone
const telefoneInput = document.getElementById('telefone');
if (telefoneInput) {
    telefoneInput.addEventListener('input', function(e) {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length <= 10) {
            value = value.replace(/^(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
        } else {
            value = value.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
        }
        e.target.value = value;
    });
}
</script>

<style>
    .card {
        border-radius: 10px;
        overflow: hidden;
    }
    h5 {
        border-left: 4px solid #0d6efd;
        padding-left: 12px;
    }
</style>

{% endblock %}
