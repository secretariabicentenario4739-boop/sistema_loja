{% extends "base.html" %}

{% block title %}Editar Comunicado{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-pencil-square"></i> 
                Editar Comunicado
            </h2>
            <a href="/comunicados" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="card shadow">
            <div class="card-header bg-warning">
                <h5 class="mb-0">Editar Comunicado</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Título *</label>
                        <input type="text" class="form-control" name="titulo" 
                               value="{{ comunicado.titulo }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Conteúdo *</label>
                        <textarea class="form-control" name="conteudo" rows="8" required>{{ comunicado.conteudo }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" name="tipo">
                                <option value="informativo" {% if comunicado.tipo == 'informativo' %}selected{% endif %}>Informativo</option>
                                <option value="aviso" {% if comunicado.tipo == 'aviso' %}selected{% endif %}>Aviso</option>
                                <option value="urgente" {% if comunicado.tipo == 'urgente' %}selected{% endif %}>Urgente</option>
                                <option value="lembrete" {% if comunicado.tipo == 'lembrete' %}selected{% endif %}>Lembrete</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Prioridade</label>
                            <select class="form-select" name="prioridade">
                                <option value="normal" {% if comunicado.prioridade == 'normal' %}selected{% endif %}>Normal</option>
                                <option value="importante" {% if comunicado.prioridade == 'importante' %}selected{% endif %}>Importante</option>
                                <option value="urgente" {% if comunicado.prioridade == 'urgente' %}selected{% endif %}>Urgente</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Data de Início *</label>
                            <input type="date" class="form-control" name="data_inicio" 
                                   value="{{ comunicado.data_inicio }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data de Término (opcional)</label>
                            <input type="date" class="form-control" name="data_fim" 
                                   value="{{ comunicado.data_fim or '' }}">
                            <small class="text-muted">Deixe em branco para não expirar</small>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-check mt-4">
                                <input class="form-check-input" type="checkbox" name="ativo" id="ativo" value="1"
                                       {% if comunicado.ativo == 1 %}checked{% endif %}>
                                <label class="form-check-label" for="ativo">
                                    Ativo (visível para os obreiros)
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-warning btn-lg px-5">
                            <i class="bi bi-save"></i> Salvar Alterações
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
