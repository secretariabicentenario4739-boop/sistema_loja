{% extends "base.html" %}

{% block title %}Novo Comunicado{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-megaphone"></i> 
                Novo Comunicado
            </h2>
            <a href="/comunicados" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Publicar Comunicado</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Título *</label>
                        <input type="text" class="form-control" name="titulo" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Conteúdo *</label>
                        <textarea class="form-control" name="conteudo" rows="8" required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" name="tipo">
                                <option value="informativo">Informativo</option>
                                <option value="aviso">Aviso</option>
                                <option value="urgente">Urgente</option>
                                <option value="lembrete">Lembrete</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Prioridade</label>
                            <select class="form-select" name="prioridade">
                                <option value="normal">Normal</option>
                                <option value="importante">Importante</option>
                                <option value="urgente">Urgente</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Data de Início *</label>
                            <input type="date" class="form-control" name="data_inicio" 
                                   value="{{ now.strftime('%Y-%m-%d') }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data de Término (opcional)</label>
                            <input type="date" class="form-control" name="data_fim">
                            <small class="text-muted">Deixe em branco para não expirar</small>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-success btn-lg px-5">
                            <i class="bi bi-save"></i> Publicar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
