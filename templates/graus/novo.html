{% extends "base.html" %}

{% block title %}Novo Grau{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-plus-circle"></i> Novo Grau</h2>
            <a href="/graus" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-star-fill"></i> Dados do Grau</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Nome do Grau *</label>
                            <input type="text" class="form-control" name="nome" required>
                            <small class="text-muted">Ex: Mestre Instalado, Arquiteto Real, etc.</small>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Nível</label>
                            <select class="form-select" name="nivel">
                                <option value="1">Aprendiz (1º Grau)</option>
                                <option value="2">Companheiro (2º Grau)</option>
                                <option value="3">Mestre (3º Grau)</option>
                                <option value="4">Superior (4º Grau ou superior)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Ordem</label>
                            <input type="number" class="form-control" name="ordem" placeholder="Ordem de exibição">
                            <small class="text-muted">Deixe em branco para ordem alfabética</small>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" name="descricao" rows="4" 
                                  placeholder="Descreva as características e requisitos deste grau..."></textarea>
                    </div>

                    <div class="text-center mt-4">
                        <a href="/graus" class="btn btn-secondary me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success btn-lg px-5">
                            <i class="bi bi-save"></i> Salvar Grau
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
