{% extends "base_public.html" %}

{% block title %}Login - Sistema Maçônico{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">
                        <i class="bi bi-box-arrow-in-right"></i> Acesso ao Sistema
                    </h4>
                </div>
                <div class="card-body p-4">
                    <!-- REMOVA ESTE BLOCO DE MENSAGENS -->
                    <!--
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    -->
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Usuário</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" name="usuario" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Senha</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" name="senha" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-box-arrow-in-right"></i> Entrar no Sistema
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center mb-3">
                        <a href="/recuperar-senha" class="text-decoration-none small">
                            <i class="bi bi-key"></i> Esqueceu sua senha?
                        </a>
                    </div>
                    
                    <div class="text-center">
                        <small class="text-muted">
                            <i class="bi bi-shield-lock"></i> Área restrita aos obreiros da loja
                        </small>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <a href="/" class="text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Voltar para o site
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
