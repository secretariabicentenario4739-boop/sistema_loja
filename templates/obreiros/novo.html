{% extends "base.html" %}

{% block title %}Novo Obreiro{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-person-plus"></i> Novo Obreiro</h2>
            <a href="/obreiros" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>

        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">Dados do Obreiro</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Usuário *</label>
                            <input type="text" class="form-control" name="usuario" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Senha *</label>
                            <input type="password" class="form-control" name="senha" required>
                        </div>
                    </div>

                    <hr>
                    <h6 class="mb-3">Dados Pessoais</h6>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome Completo *</label>
                            <input type="text" class="form-control" name="nome_completo" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome Maçônico</label>
                            <input type="text" class="form-control" name="nome_maconico">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">CIM Nº</label>
                            <input type="text" class="form-control" name="cim_numero">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" name="tipo">
                                <option value="obreiro">Obreiro</option>
                                <option value="sindicante">Sindicante</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Grau Atual</label>
                            <select class="form-select" name="grau_atual">
                                <option value="1">Aprendiz</option>
                                <option value="2">Companheiro</option>
                                <option value="3">Mestre</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Data de Iniciação</label>
                            <input type="date" class="form-control" name="data_iniciacao">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Data de Elevação</label>
                            <input type="date" class="form-control" name="data_elevacao">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Data de Exaltação</label>
                            <input type="date" class="form-control" name="data_exaltacao">
                        </div>
                    </div>

                    <hr>
                    <h6 class="mb-3">Contato</h6>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Telefone</label>
                            <input type="text" class="form-control" name="telefone" id="telefone">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" class="form-control" name="email">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Endereço</label>
                        <textarea class="form-control" name="endereco" rows="2"></textarea>
                    </div>

                    <hr>
                    <h6 class="mb-3">Loja</h6>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Nome da Loja</label>
                            <select class="form-select" name="loja_nome" id="lojaSelect">
                                <option value="">Selecione...</option>
                                {% for loja in lojas %}
                                <option value="{{ loja.nome }}" data-numero="{{ loja.numero }}" data-oriente="{{ loja.oriente }}">
                                    {{ loja.nome }} - Nº {{ loja.numero }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Nº da Loja</label>
                            <input type="text" class="form-control" name="loja_numero" id="lojaNumero" readonly>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Oriente</label>
                            <input type="text" class="form-control" name="loja_orient" id="lojaOriente" readonly>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-success btn-lg px-5">
                            <i class="bi bi-save"></i> Salvar Obreiro
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('lojaSelect').addEventListener('change', function() {
        var selected = this.options[this.selectedIndex];
        document.getElementById('lojaNumero').value = selected.dataset.numero || '';
        document.getElementById('lojaOriente').value = selected.dataset.oriente || '';
    });

    // Máscara para telefone
    document.getElementById('telefone').addEventListener('input', function(e) {
        var value = e.target.value.replace(/\D/g, '');
        if (value.length <= 10) {
            value = value.replace(/^(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
        } else {
            value = value.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
        }
        e.target.value = value;
    });
</script>
{% endblock %}
