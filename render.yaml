services:
  - type: web
    name: sistema-maconico
    runtime: image
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-maconico-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

databases:
  - name: sistema-maconico-db
    plan: free