services:
  - type: web
    name: sistema-maconico
    runtime: image
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: sistema-maconico-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sistema-maconico-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sistema-maconico-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sistema-maconico-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sistema-maconico-db
          property: password
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: 1

databases:
  - name: sistema-maconico-db
    plan: free