services:
  - type: web
    name: sistema-maconico
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DB_HOST
        fromDatabase:
          name: sistema-maconico-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sistema-maconico-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sistema-maconico-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sistema-maconico-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sistema-maconico-db
          property: password
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

databases:
  - name: sistema-maconico-db
    plan: free